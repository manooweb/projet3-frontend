<div class="me">
  <mat-card class="">
    <mat-card-title>

      <div fxLayout="row" fxLayoutAlign="start center">
        <button mat-icon-button (click)="back()">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h1>User information</h1>
      </div>

    </mat-card-title>
    <mat-card-content>
      @if (user) {
        <div fxLayout="column" fxLayoutAlign="start center">
          <p>Name: {{ user.name }}</p>
          <p>Email: {{ user.email }}</p>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
